services:
  kt-demo-alarm:
    image: kt-demo-alarm:latest
    pull_policy: never # (중요) 로컬에 load된 이미지 사용 강제
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      - TZ=Asia/Seoul
      - DEBUG=false
      - DATABASE_PATH=/app/data/kt_demo_alarm.db
      # production 스케줄 (settings.py 기본값과 다른 운영 시간)
      - CRAWLING_HOUR=7
      - CRAWLING_MINUTE=00
      - ROUTE_CHECK_HOUR=8
      - ROUTE_CHECK_MINUTE=00
      - ZONE_CHECK_HOUR=8
      - ZONE_CHECK_MINUTE=0
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - topis_cache:/app/topis_cache
      - topis_attachments:/app/topis_attachments
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  # Optional: Add a database service if switching from SQLite
  # postgres:
  #   image: postgres:15
  #   environment:
  #     POSTGRES_DB: kt_demo_alarm
  #     POSTGRES_USER: ${POSTGRES_USER:-kt_user}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password}
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   restart: unless-stopped

volumes:
  # postgres_data:  # Uncomment if using PostgreSQL
  data_volume:
  logs_volume:
  topis_cache:
  topis_attachments:
