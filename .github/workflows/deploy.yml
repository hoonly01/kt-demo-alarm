name: Deploy to AWS EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: kt-demo-alarm-deploy
  cancel-in-progress: true

permissions:
  contents: read

env:
  APP_NAME: kt-demo-alarm
  APP_ROOT: /opt/kt-demo-alarm
  APP_BIND_HOST: 127.0.0.1
  APP_PORT: "8000"
  HEALTH_TIMEOUT_SECONDS: "180"
  HEALTH_INTERVAL_SECONDS: "3"
  RELEASE_KEEP: "5"
  BUNDLE_NAME: source-bundle.tar.gz
  CHECKSUM_NAME: source-bundle.sha256
  ADVISORY_CONTRACT_ID: template-only-advisory-v1
  NATIVE_LIVE_GATE_ID: native-live-activation-gate-v1

jobs:
  blocking-tests:
    runs-on: ubuntu-latest
    name: Blocking tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Playwright browser for blocking smoke test
        run: uv run --no-dev playwright install chromium

      - name: Check lockfile freshness
        run: uv lock --check

      - name: Run blocking pytest
        run: python scripts/ci/advisory_contract.py run-blocking-pytest -- -q

  advisory-template-regression:
    needs: blocking-tests
    runs-on: ubuntu-latest
    name: Advisory template regression
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Run advisory selectors and record evidence
        env:
          ADVISORY_CONTRACT_ID: ${{ env.ADVISORY_CONTRACT_ID }}
        run: |
          set +e
          python scripts/ci/advisory_contract.py run-advisory-pytest -- -q
          advisory_exit_code=$?
          set -e

          python scripts/ci/advisory_contract.py write-summary \
            --exit-code "${advisory_exit_code}" \
            --output "${GITHUB_STEP_SUMMARY}"

          if [[ "${advisory_exit_code}" -gt 1 ]]; then
            exit "${advisory_exit_code}"
          fi

  package-native-release:
    needs: blocking-tests
    runs-on: ubuntu-latest
    name: Package native release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build allowlisted source bundle
        run: bash deploy/native/package-source-bundle.sh release-artifact

      - name: Upload source bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-bundle
          path: |
            release-artifact/${{ env.BUNDLE_NAME }}
            release-artifact/${{ env.CHECKSUM_NAME }}
          retention-days: 1

  deploy-native-preflight:
    needs:
      - package-native-release
      - advisory-template-regression
    runs-on: ubuntu-latest
    name: Native deploy preflight
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Download source bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: source-bundle
          path: release-artifact

      - name: Check shell syntax
        run: bash -n deploy/native/*.sh scripts/native/*.sh

      - name: Verify packaged source bundle
        run: |
          bash deploy/native/verify-source-bundle.sh \
            "release-artifact/${BUNDLE_NAME}" \
            "release-artifact/${CHECKSUM_NAME}"

      - name: Prepare native runtime without browser download
        env:
          KT_NATIVE_APP_ROOT: ${{ runner.temp }}/kt-demo-alarm
          KT_NATIVE_SHARED_DIR: ${{ runner.temp }}/kt-demo-alarm/shared
          KT_NATIVE_DATA_DIR: ${{ runner.temp }}/kt-demo-alarm/shared/data
          KT_NATIVE_LOG_DIR: ${{ runner.temp }}/kt-demo-alarm/shared/logs
          KT_NATIVE_CACHE_DIR: ${{ runner.temp }}/kt-demo-alarm/shared/topis_cache
          KT_NATIVE_ATTACHMENT_DIR: ${{ runner.temp }}/kt-demo-alarm/shared/topis_attachments
          KT_NATIVE_PLAYWRIGHT_BROWSERS_PATH: ${{ runner.temp }}/kt-demo-alarm/shared/ms-playwright
          KT_NATIVE_SKIP_PLAYWRIGHT_BROWSER: "1"
        run: bash scripts/native/setup-runtime.sh --skip-playwright-browser

      - name: Run non-mutating native preflight
        env:
          KT_NATIVE_APP_ROOT: ${{ runner.temp }}/kt-demo-alarm
          KT_NATIVE_SHARED_DIR: ${{ runner.temp }}/kt-demo-alarm/shared
          KT_NATIVE_DATA_DIR: ${{ runner.temp }}/kt-demo-alarm/shared/data
          KT_NATIVE_LOG_DIR: ${{ runner.temp }}/kt-demo-alarm/shared/logs
          KT_NATIVE_CACHE_DIR: ${{ runner.temp }}/kt-demo-alarm/shared/topis_cache
          KT_NATIVE_ATTACHMENT_DIR: ${{ runner.temp }}/kt-demo-alarm/shared/topis_attachments
          KT_NATIVE_PLAYWRIGHT_BROWSERS_PATH: ${{ runner.temp }}/kt-demo-alarm/shared/ms-playwright
        run: bash scripts/native/preflight.sh --skip-port-check

      - name: Render and inspect systemd unit
        env:
          KT_NATIVE_CURRENT_LINK: /opt/kt-demo-alarm/current
          KT_NATIVE_SHARED_DIR: /opt/kt-demo-alarm/shared
          KT_NATIVE_ENV_FILE: /opt/kt-demo-alarm/shared/.env
          KT_NATIVE_PORT: ${{ env.APP_PORT }}
        run: |
          set -euo pipefail
          bash scripts/native/render-systemd-unit.sh > kt-demo-alarm.service
          test -s kt-demo-alarm.service
          ! grep -E '__[A-Z_]+__' kt-demo-alarm.service
          grep -F 'Type=exec' kt-demo-alarm.service
          grep -F 'EnvironmentFile=' kt-demo-alarm.service
          grep -F 'ProtectSystem=strict' kt-demo-alarm.service
          grep -F 'ReadWritePaths=' kt-demo-alarm.service

      - name: Run native asset tests
        run: uv run pytest tests/test_native_runtime_assets.py -q

      - name: Record activation gate state
        env:
          KT_NATIVE_DEPLOY_ENABLED: ${{ vars.KT_NATIVE_DEPLOY_ENABLED }}
          NATIVE_LIVE_GATE_ID: ${{ env.NATIVE_LIVE_GATE_ID }}
        run: |
          {
            echo "## ${NATIVE_LIVE_GATE_ID}"
            if [[ "${KT_NATIVE_DEPLOY_ENABLED:-}" == "1" ]]; then
              echo "- Repository variable \`KT_NATIVE_DEPLOY_ENABLED=1\` is enabled."
              echo "- \`deploy-native-live\` will still wait for protected \`native-live\` environment approval."
            else
              echo "- Repository variable \`KT_NATIVE_DEPLOY_ENABLED\` is not enabled."
              echo "- Workflow stops at blocking tests, package, advisory evidence, and native preflight."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

  deploy-native-live:
    needs: deploy-native-preflight
    if: ${{ vars.KT_NATIVE_DEPLOY_ENABLED == '1' }}
    runs-on: ubuntu-latest
    name: Deploy native live
    environment:
      name: native-live
    steps:
      - name: Checkout deploy scripts
        uses: actions/checkout@v4

      - name: Download source bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: source-bundle
          path: release-artifact

      - name: Deploy source bundle to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          APP_NAME: ${{ env.APP_NAME }}
          APP_ROOT: ${{ env.APP_ROOT }}
          APP_BIND_HOST: ${{ env.APP_BIND_HOST }}
          APP_PORT: ${{ env.APP_PORT }}
          HEALTH_TIMEOUT_SECONDS: ${{ env.HEALTH_TIMEOUT_SECONDS }}
          HEALTH_INTERVAL_SECONDS: ${{ env.HEALTH_INTERVAL_SECONDS }}
          RELEASE_KEEP: ${{ env.RELEASE_KEEP }}
          BUNDLE_NAME: ${{ env.BUNDLE_NAME }}
          CHECKSUM_NAME: ${{ env.CHECKSUM_NAME }}
          RELEASE_ID: ${{ github.run_id }}-${{ github.sha }}
        run: |
          set -euo pipefail

          required_env=(EC2_HOST EC2_USERNAME EC2_SSH_KEY APP_NAME APP_ROOT RELEASE_ID)
          for name in "${required_env[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error title=Missing deploy input::${name} is required"
              exit 1
            fi
          done

          ssh_key_file="$(mktemp)"
          trap 'rm -f -- "${ssh_key_file}"' EXIT
          printf '%s\n' "${EC2_SSH_KEY}" > "${ssh_key_file}"
          chmod 600 "${ssh_key_file}"

          ssh_options=(
            -o StrictHostKeyChecking=no
            -o IdentitiesOnly=yes
            -i "${ssh_key_file}"
          )

          quote_remote() {
            printf '%q' "$1"
          }

          remote_incoming_dir="${APP_ROOT}/incoming/${RELEASE_ID}"
          remote_incoming_dir_q="$(quote_remote "${remote_incoming_dir}")"
          ssh "${ssh_options[@]}" "${EC2_USERNAME}@${EC2_HOST}" \
            "mkdir -p ${remote_incoming_dir_q} && chmod 700 ${remote_incoming_dir_q}"

          scp "${ssh_options[@]}" \
            "release-artifact/${BUNDLE_NAME}" \
            "release-artifact/${CHECKSUM_NAME}" \
            deploy/native/deploy-release.sh \
            deploy/native/verify-source-bundle.sh \
            "${EC2_USERNAME}@${EC2_HOST}:${remote_incoming_dir}/"

          remote_deploy_command="$(
            printf 'APP_NAME=%q APP_ROOT=%q APP_BIND_HOST=%q APP_PORT=%q HEALTH_TIMEOUT_SECONDS=%q HEALTH_INTERVAL_SECONDS=%q RELEASE_KEEP=%q RELEASE_ID=%q BUNDLE_PATH=%q CHECKSUM_PATH=%q VERIFY_SOURCE_BUNDLE_BIN=%q bash %q' \
              "${APP_NAME}" \
              "${APP_ROOT}" \
              "${APP_BIND_HOST}" \
              "${APP_PORT}" \
              "${HEALTH_TIMEOUT_SECONDS}" \
              "${HEALTH_INTERVAL_SECONDS}" \
              "${RELEASE_KEEP}" \
              "${RELEASE_ID}" \
              "${remote_incoming_dir}/${BUNDLE_NAME}" \
              "${remote_incoming_dir}/${CHECKSUM_NAME}" \
              "${remote_incoming_dir}/verify-source-bundle.sh" \
              "${remote_incoming_dir}/deploy-release.sh"
          )"
          ssh "${ssh_options[@]}" "${EC2_USERNAME}@${EC2_HOST}" \
            "${remote_deploy_command}"

  public-health:
    needs: deploy-native-live
    if: ${{ needs.deploy-native-live.result == 'success' }}
    runs-on: ubuntu-latest
    name: Public health
    steps:
      - name: Verify deployment public health
        env:
          PUBLIC_DOMAIN: ${{ secrets.PUBLIC_DOMAIN }}
        run: |
          set -euo pipefail
          if [[ -z "${PUBLIC_DOMAIN:-}" ]]; then
            echo "::error title=Missing deploy input::PUBLIC_DOMAIN is required when native live deploy is enabled"
            exit 1
          fi

          echo "Checking public health endpoint..."
          for i in {1..60}; do
            if curl -fsS "https://${PUBLIC_DOMAIN}/" > /dev/null 2>&1; then
              echo "✅ Application is reachable: https://${PUBLIC_DOMAIN}/"
              exit 0
            fi
            echo "Attempt ${i}: waiting..."
            sleep 5
          done

          echo "❌ Public health check failed (verify Nginx + SSL + SG inbound 443 for ${PUBLIC_DOMAIN})"
          exit 1

# ---------------------------------------------------------------------------
# Inactive legacy Docker deploy path retained for audit/handover only.
# Do not uncomment without a new PRD and explicit operator approval.
#
# Previous active graph:
#   deploy-test-bypass -> build -> deploy
#
# Previous Docker responsibilities:
#   - docker/setup-buildx-action
#   - docker/build-push-action with tags kt-demo-alarm:latest and kt-demo-alarm:${{ github.sha }}
#   - gzip kt-demo-alarm-image.tar
#   - upload/download Docker image artifact named docker-image
#   - create runner-side app .env from GitHub secrets
#   - scp kt-demo-alarm-image.tar.gz, docker-compose.yml, and .env to /opt/kt-demo-alarm
#   - remote docker compose down
#   - remote docker image prune
#   - remote gunzip ... | docker load
#   - remote docker compose up -d --no-build
#   - public curl health check
# ---------------------------------------------------------------------------
