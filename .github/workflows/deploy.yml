name: Deploy native runtime to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: kt-demo-alarm-deploy
  cancel-in-progress: true

permissions:
  contents: read

env:
  KT_NATIVE_APP_DIR: ${{ vars.KT_NATIVE_APP_DIR || '/opt/kt-demo-alarm' }}
  KT_NATIVE_SERVICE_NAME: ${{ vars.KT_NATIVE_SERVICE_NAME || 'kt-demo-alarm' }}
  KT_NATIVE_HOST: ${{ vars.KT_NATIVE_HOST || '127.0.0.1' }}
  KT_NATIVE_PORT: ${{ vars.KT_NATIVE_PORT || '8000' }}
  KT_NATIVE_UV_BIN: ${{ vars.KT_NATIVE_UV_BIN || 'uv' }}
  KT_NATIVE_PYTHON_BIN: ${{ vars.KT_NATIVE_PYTHON_BIN || 'python3' }}
  KT_NATIVE_HEALTH_RETRIES: ${{ vars.KT_NATIVE_HEALTH_RETRIES || '60' }}
  KT_NATIVE_HEALTH_INTERVAL_SECONDS: ${{ vars.KT_NATIVE_HEALTH_INTERVAL_SECONDS || '5' }}
  KT_NATIVE_INSTALL_PLAYWRIGHT_DEPS: ${{ vars.KT_NATIVE_INSTALL_PLAYWRIGHT_DEPS || '0' }}
  KT_NATIVE_SKIP_PLAYWRIGHT_BROWSER: ${{ vars.KT_NATIVE_SKIP_PLAYWRIGHT_BROWSER || '0' }}
  KT_NATIVE_REMOTE_TMP_DIR: ${{ vars.KT_NATIVE_REMOTE_TMP_DIR || '/tmp' }}

jobs:
  # test:
  #   name: Run Tests (temporarily disabled for native EC2 deploy)
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-python@v5
  #       with:
  #         python-version: "3.12"
  #     - uses: astral-sh/setup-uv@v5
  #     - run: uv sync --frozen
  #     - run: uv run pytest

  # build-docker:
  #   name: Build Docker image (disabled; native EC2 deploy does not build images)
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: docker/setup-buildx-action@v3
  #     - uses: docker/build-push-action@v5

  deploy-native:
    # needs: test
    runs-on: ubuntu-latest
    name: Deploy native runtime to EC2
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create source artifact
        run: |
          set -euo pipefail
          git archive --format=tar.gz -o kt-demo-alarm-source.tar.gz HEAD

      - name: Deploy source to EC2 native runtime
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_SSH_HOST_KEY: ${{ secrets.EC2_SSH_HOST_KEY }}
          PUBLIC_DOMAIN: ${{ secrets.PUBLIC_DOMAIN }}
        run: |
          set -euo pipefail

          cleanup_runner() {
            rm -f \
              deploy-key.pem \
              known_hosts \
              kt-demo-alarm-source.tar.gz \
              native-deploy-config.env
          }
          trap cleanup_runner EXIT

          required_env=(
            EC2_HOST
            EC2_USERNAME
            EC2_SSH_KEY
            EC2_SSH_HOST_KEY
            PUBLIC_DOMAIN
            KT_NATIVE_APP_DIR
            KT_NATIVE_SERVICE_NAME
            KT_NATIVE_HOST
            KT_NATIVE_PORT
            KT_NATIVE_UV_BIN
            KT_NATIVE_PYTHON_BIN
            KT_NATIVE_HEALTH_RETRIES
            KT_NATIVE_HEALTH_INTERVAL_SECONDS
            KT_NATIVE_REMOTE_TMP_DIR
          )
          for name in "${required_env[@]}"; do
            if [[ -z "${!name}" ]]; then
              echo "❌ Required deployment value is empty: ${name}"
              exit 1
            fi
          done

          echo "${EC2_SSH_KEY}" > deploy-key.pem
          chmod 600 deploy-key.pem
          printf '%s\n' "${EC2_SSH_HOST_KEY}" > known_hosts
          chmod 600 known_hosts

          ssh_options=(
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile=known_hosts
            -i deploy-key.pem
          )

          remote_tmp_dir="${KT_NATIVE_REMOTE_TMP_DIR%/}"
          remote_source_tgz="${remote_tmp_dir}/kt-demo-alarm-source-${GITHUB_RUN_ID}.tar.gz"
          remote_config="${remote_tmp_dir}/kt-demo-alarm-native-deploy-${GITHUB_RUN_ID}.env"

          write_shell_var() {
            local name="$1"
            printf '%s=%q\n' "${name}" "${!name}" >> native-deploy-config.env
          }

          : > native-deploy-config.env
          config_names=(
            KT_NATIVE_APP_DIR
            KT_NATIVE_SERVICE_NAME
            KT_NATIVE_HOST
            KT_NATIVE_PORT
            KT_NATIVE_UV_BIN
            KT_NATIVE_PYTHON_BIN
            KT_NATIVE_HEALTH_RETRIES
            KT_NATIVE_HEALTH_INTERVAL_SECONDS
            KT_NATIVE_INSTALL_PLAYWRIGHT_DEPS
            KT_NATIVE_SKIP_PLAYWRIGHT_BROWSER
          )
          for name in "${config_names[@]}"; do
            write_shell_var "${name}"
          done
          printf '%s=%q\n' KT_NATIVE_REMOTE_SOURCE_TGZ "${remote_source_tgz}" >> native-deploy-config.env
          printf '%s=%q\n' KT_NATIVE_REMOTE_CONFIG "${remote_config}" >> native-deploy-config.env

          ssh "${ssh_options[@]}" \
            "${EC2_USERNAME}@${EC2_HOST}" \
            "mkdir -p $(printf '%q' "${remote_tmp_dir}")"

          scp "${ssh_options[@]}" \
            kt-demo-alarm-source.tar.gz \
            "${EC2_USERNAME}@${EC2_HOST}:${remote_source_tgz}"

          scp "${ssh_options[@]}" \
            native-deploy-config.env \
            "${EC2_USERNAME}@${EC2_HOST}:${remote_config}"

          ssh "${ssh_options[@]}" \
            "${EC2_USERNAME}@${EC2_HOST}" \
            "KT_NATIVE_REMOTE_CONFIG=$(printf '%q' "${remote_config}") bash -s" <<'ENDSSH'
            set -euo pipefail

            # shellcheck disable=SC1090
            source "${KT_NATIVE_REMOTE_CONFIG}"

            cleanup_remote() {
              rm -f \
                "${KT_NATIVE_REMOTE_SOURCE_TGZ}" \
                "${KT_NATIVE_REMOTE_CONFIG}"
            }
            trap cleanup_remote EXIT

            required_remote_env=(
              KT_NATIVE_APP_DIR
              KT_NATIVE_SERVICE_NAME
              KT_NATIVE_HOST
              KT_NATIVE_PORT
              KT_NATIVE_UV_BIN
              KT_NATIVE_PYTHON_BIN
              KT_NATIVE_HEALTH_RETRIES
              KT_NATIVE_HEALTH_INTERVAL_SECONDS
              KT_NATIVE_REMOTE_SOURCE_TGZ
            )
            for name in "${required_remote_env[@]}"; do
              if [[ -z "${!name}" ]]; then
                echo "❌ Required remote deployment value is empty: ${name}"
                exit 1
              fi
            done

            [[ -d "${KT_NATIVE_APP_DIR}" ]] || {
              echo "❌ Native app directory is missing: ${KT_NATIVE_APP_DIR}"
              exit 1
            }
            [[ -w "${KT_NATIVE_APP_DIR}" ]] || {
              echo "❌ Native app directory is not writable by deploy account: ${KT_NATIVE_APP_DIR}"
              exit 1
            }
            sudo systemctl cat "${KT_NATIVE_SERVICE_NAME}" >/dev/null

            tar -xzf "${KT_NATIVE_REMOTE_SOURCE_TGZ}" -C "${KT_NATIVE_APP_DIR}"

            KT_NATIVE_APP_DIR="${KT_NATIVE_APP_DIR}" \
            KT_NATIVE_SERVICE_NAME="${KT_NATIVE_SERVICE_NAME}" \
            KT_NATIVE_HOST="${KT_NATIVE_HOST}" \
            KT_NATIVE_PORT="${KT_NATIVE_PORT}" \
            KT_NATIVE_UV_BIN="${KT_NATIVE_UV_BIN}" \
            KT_NATIVE_PYTHON_BIN="${KT_NATIVE_PYTHON_BIN}" \
            KT_NATIVE_INSTALL_PLAYWRIGHT_DEPS="${KT_NATIVE_INSTALL_PLAYWRIGHT_DEPS}" \
            KT_NATIVE_SKIP_PLAYWRIGHT_BROWSER="${KT_NATIVE_SKIP_PLAYWRIGHT_BROWSER}" \
              bash -lc 'cd "${KT_NATIVE_APP_DIR}" && scripts/native/setup-runtime.sh'

            KT_NATIVE_APP_DIR="${KT_NATIVE_APP_DIR}" \
            KT_NATIVE_SERVICE_NAME="${KT_NATIVE_SERVICE_NAME}" \
            KT_NATIVE_HOST="${KT_NATIVE_HOST}" \
            KT_NATIVE_PORT="${KT_NATIVE_PORT}" \
            KT_NATIVE_UV_BIN="${KT_NATIVE_UV_BIN}" \
            KT_NATIVE_PYTHON_BIN="${KT_NATIVE_PYTHON_BIN}" \
              bash -lc 'cd "${KT_NATIVE_APP_DIR}" && scripts/native/preflight.sh --skip-port-check --allow-active-systemd'

            sudo systemctl restart "${KT_NATIVE_SERVICE_NAME}"

            KT_NATIVE_APP_DIR="${KT_NATIVE_APP_DIR}" \
            KT_NATIVE_HEALTH_HOST="127.0.0.1" \
            KT_NATIVE_PORT="${KT_NATIVE_PORT}" \
            KT_NATIVE_PYTHON_BIN="${KT_NATIVE_PYTHON_BIN}" \
            KT_NATIVE_HEALTH_RETRIES="${KT_NATIVE_HEALTH_RETRIES}" \
            KT_NATIVE_HEALTH_INTERVAL_SECONDS="${KT_NATIVE_HEALTH_INTERVAL_SECONDS}" \
              bash -lc 'cd "${KT_NATIVE_APP_DIR}" && scripts/native/healthcheck.sh'
          ENDSSH

      - name: Verify deployment through public endpoint
        env:
          PUBLIC_DOMAIN: ${{ secrets.PUBLIC_DOMAIN }}
        run: |
          set -euo pipefail
          echo "Checking public health endpoint..."
          for attempt in $(seq 1 "${KT_NATIVE_HEALTH_RETRIES}"); do
            if curl -fsS "https://${PUBLIC_DOMAIN}/" > /dev/null 2>&1; then
              echo "✅ Application is reachable: https://${PUBLIC_DOMAIN}/"
              exit 0
            fi
            echo "Attempt ${attempt}: waiting..."
            sleep "${KT_NATIVE_HEALTH_INTERVAL_SECONDS}"
          done
          echo "❌ Public health check failed for https://${PUBLIC_DOMAIN}/"
          exit 1
